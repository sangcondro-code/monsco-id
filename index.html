<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monsco</title>

    <!-- PERF: preconnect/dns-prefetch — HANYA network hint (mulai DNS+TLS
         lebih awal), TIDAK menyentuh CSS/layout/ukuran elemen sama sekali,
         jadi tidak mungkin menyebabkan bug geser/gap apa pun. script.google.com
         adalah yang paling penting di sini karena itu tujuan <iframe> di bawah —
         percepatan ini murni memangkas waktu sebelum iframe mulai memuat. -->
    <link rel="preconnect" href="https://script.google.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="dns-prefetch" href="https://script.google.com">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

    <!-- Ikon — ini yang bikin homescreen icon rapi (bukan huruf "M" default),
         dan favicon di tab browser. TIDAK butuh manifest.json sama sekali,
         ini fitur bawaan Apple/browser sendiri yang independen dari PWA. -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://cdn.jsdelivr.net/gh/sangcondro-code/Monsco@main/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://cdn.jsdelivr.net/gh/sangcondro-code/Monsco@main/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://cdn.jsdelivr.net/gh/sangcondro-code/Monsco@main/apple-touch-icon.png">

    <!-- Bikin fullscreen (tanpa address bar Safari) pas dibuka dari
         homescreen — juga tidak butuh manifest.json. -->
    <meta name="apple-mobile-web-app-title" content="Monsco">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#005CAA">
    <style>
        /* Menghapus margin dan padding bawaan browser agar benar-benar penuh */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Mencegah munculnya scrollbar ganda di luar iframe */
            background-color: #ffffff; /* Latar belakang putih saat iframe loading */
        }

        /* Mengatur iframe agar memenuhi seluruh layar */
        .gas-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none; /* Menghilangkan garis bingkai iframe */
        }
    </style>
</head>
<body>

    <iframe 
        src="https://script.google.com/macros/s/AKfycbyNTYGR7-XIqx8MOdZzFEKazAFOkquSnlE8MOEf4sdih4Cp497N6fLljQ1fFu_7fwqx/exec" 
        class="gas-iframe" 
        allowfullscreen="true"
        webkitallowfullscreen="true"
        mozallowfullscreen="true">
    </iframe>

</body>
</html>
